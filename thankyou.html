<!DOCTYPE html>
<html lang="pt-BR" class="antialiased">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedido Confirmado - BeyShop Arena</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            beyRed:   "#ff2e2e",
            beyBlue:  "#00b4ff",
            beyYellow:"#ffd400",
            beyDark:  "#0a0d12",
          }
        }
      }
    }
  </script>

  <style>
    :root {
      --header-height: 72px;
    }

    header.site-header {
      height: var(--header-height);
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      background: linear-gradient(90deg, rgba(10,10,20,.95), rgba(40,10,60,.95));
      border-bottom: 1px solid rgba(255,255,255,0.05);
      backdrop-filter: blur(6px);
    }

    main.site-main {
      padding-top: calc(var(--header-height) + 12px);
    }

    @media (max-width: 640px) {
      :root { --header-height: 64px; }
      main.site-main {
        padding-top: calc(var(--header-height) + 10px);
      }
    }

    /* Background borrado */
    .bg-hero {
      position: relative;
      overflow: hidden;
    }
    .bg-hero::before {
      content:"";
      position:absolute;
      inset:0;
      background-image: url("/mnt/data/Gemini_Generated_Image_cnjizscnjizscnji.png");
      background-size: cover;
      background-position:center;
      filter: blur(7px) brightness(0.45);
      transform: scale(1.06);
      z-index:0;
    }
    .hero-content {
      position: relative;
      z-index: 2;
    }

    .metal-card {
      background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(0,0,0,0.35));
      border: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(6px);
    }
  </style>
</head>

<body class="bg-beyDark text-white">

<!-- HEADER -->
<header class="site-header shadow-xl">
  <div class="max-w-6xl mx-auto px-4 flex items-center justify-between h-full">

    <a href="home.html" class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-gradient-to-br from-beyBlue to-beyRed flex items-center justify-center text-white text-xl">
        🌀
      </div>
      <span class="font-extrabold text-lg">BeyShop Arena</span>
    </a>

    <nav class="flex items-center gap-3">
      <a href="category.html" class="px-3 py-2 rounded-full bg-beyYellow text-black font-semibold">Categorias</a>
      <a href="home.html" class="px-3 py-2 rounded-full bg-beyBlue text-black font-semibold">Home</a>
    </nav>

  </div>
</header>


<!-- HERO -->
<section class="bg-hero py-24">
  <div class="hero-content max-w-4xl mx-auto px-4 text-center">

    <h1 class="text-5xl font-extrabold drop-shadow-lg">
      🎉 Pedido <span class="text-beyYellow">Confirmado!</span>
    </h1>

    <p class="mt-4 text-xl opacity-90">
      Sua compra foi realizada com sucesso!  
      O time da BeyShop Arena já está preparando seu pedido com cuidado.
    </p>

    <p class="mt-2 text-gray-300">
      Você receberá um email com as informações de rastreio assim que for enviado.
    </p>

    <a href="home.html"
       class="inline-block mt-10 bg-beyBlue text-black font-bold px-10 py-3 rounded-full text-lg hover:scale-110 transition">
      Voltar para Home
    </a>

  </div>
</section>

</body>
</html>
