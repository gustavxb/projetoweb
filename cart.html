<!DOCTYPE html>
<html lang="pt-BR" class="antialiased">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho - BeyShop Arena</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            beyRed:   "#ff2e2e",
            beyBlue:  "#00b4ff",
            beyYellow:"#ffd400",
            beyDark:  "#0a0d12",
          }
        }
      }
    }
  </script>

  <style>
    :root {
      --header-height: 72px;
    }

    header.site-header {
      height: var(--header-height);
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      background: linear-gradient(90deg, rgba(10,10,20,.95), rgba(40,10,60,.95));
      border-bottom: 1px solid rgba(255,255,255,0.05);
      backdrop-filter: blur(6px);
    }

    main.site-main {
      padding-top: calc(var(--header-height) + 12px);
    }

    @media (max-width: 640px) {
      :root { --header-height: 64px; }
      main.site-main {
        padding-top: calc(var(--header-height) + 10px);
      }
    }

    /* Background borrado */
    .bg-hero {
      position: relative;
      overflow: hidden;
    }
    .bg-hero::before {
      content:"";
      position:absolute;
      inset:0;
      background-image: url("/mnt/data/Gemini_Generated_Image_cnjizscnjizscnji.png");
      background-size: cover;
      background-position:center;
      filter: blur(7px) brightness(0.45);
      transform: scale(1.06);
      z-index:0;
    }
    .hero-content {
      position: relative;
      z-index: 2;
    }

    .metal-card {
      background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(0,0,0,0.35));
      border: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(6px);
    }
  </style>
</head>

<body class="bg-beyDark text-white">

<!-- HEADER -->
<header class="site-header shadow-xl">
  <div class="max-w-6xl mx-auto px-4 flex items-center justify-between h-full">

    <a href="home.html" class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-gradient-to-br from-beyBlue to-beyRed flex items-center justify-center text-white text-xl">
        🌀
      </div>
      <span class="font-extrabold text-lg">BeyShop Arena</span>
    </a>

    <div class="hidden md:block flex-1 px-4">
      <input placeholder="Buscar Beyblade..." 
             class="w-full rounded-full px-4 py-2 metal-card text-white placeholder-gray-300">
    </div>

    <nav class="flex items-center gap-3">
      <a href="category.html" class="px-3 py-2 rounded-full bg-beyYellow text-black font-semibold">Categorias</a>
      <a href="cart.html" class="px-3 py-2 rounded-full bg-beyBlue text-black font-semibold">Carrinho</a>
      <a href="login.html" class="px-3 py-2 rounded-full metal-card font-semibold">Login</a>
    </nav>

  </div>
</header>


<!-- HERO -->
<section class="bg-hero py-14">
  <div class="hero-content max-w-6xl mx-auto px-4 text-center">
    <h1 class="text-4xl md:text-5xl font-extrabold drop-shadow">
      Seu <span class="text-beyYellow">Carrinho</span>
    </h1>
    <p class="opacity-80 mt-2">Confira seus itens antes de finalizar sua compra</p>
  </div>
</section>


<!-- CONTEÚDO PRINCIPAL -->
<main class="site-main max-w-6xl mx-auto px-4 py-10">

  <div id="cartContainer" class="space-y-4"></div>

  <!-- Resumo -->
  <div class="metal-card p-6 rounded-xl mt-8">
    <h2 class="text-xl font-bold mb-4">Resumo da Compra</h2>

    <div class="flex justify-between text-lg">
      <span>Total:</span>
      <span id="cartTotal" class="font-extrabold text-beyYellow">R$ 0,00</span>
    </div>

    <button onclick="goCheckout()"
            class="w-full mt-6 bg-beyYellow text-black font-bold py-3 rounded-full text-lg hover:scale-105 transition">
      Finalizar Compra
    </button>
  </div>

</main>

<script>
function loadCart() {
  const container = document.getElementById("cartContainer");
  const totalElement = document.getElementById("cartTotal");

  let cart = JSON.parse(localStorage.getItem("cart") || "[]");

  container.innerHTML = "";

  if (cart.length === 0) {
    container.innerHTML = `
      <div class="metal-card p-6 rounded-xl text-center">
        <p class="text-xl opacity-80">Seu carrinho está vazio!</p>
      </div>`;
    totalElement.textContent = "R$ 0,00";
    return;
  }

  let total = 0;

  cart.forEach((item, index) => {
    total += item.price * item.qty;

    container.innerHTML += `
      <div class="metal-card p-5 rounded-xl flex items-center gap-4">

        <img src="/mnt/data/Gemini_Generated_Image_cnjizscnjizscnji.png"
             class="w-24 h-24 object-cover rounded-lg shadow">

        <div class="flex-1">
          <h3 class="text-xl font-bold">${item.name}</h3>
          <p class="text-beyYellow font-bold">R$ ${item.price}</p>
        </div>

        <div class="flex items-center gap-2">
          <button onclick="changeQty(${index}, -1)"
                  class="px-3 py-1 bg-beyRed text-white rounded-full font-bold">-</button>

          <span class="text-lg font-bold">${item.qty}</span>

          <button onclick="changeQty(${index}, 1)"
                  class="px-3 py-1 bg-beyBlue text-black rounded-full font-bold">+</button>
        </div>

        <button onclick="removeItem(${index})"
                class="px-3 py-1 bg-red-600 rounded-full font-bold">X</button>
      </div>
    `;
  });

  totalElement.textContent = "R$ " + total.toFixed(2).replace(".", ",");
}

function changeQty(index, amount) {
  let cart = JSON.parse(localStorage.getItem("cart") || "[]");

  cart[index].qty += amount;

  if (cart[index].qty <= 0) {
    cart.splice(index, 1);
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}

function removeItem(index) {
  let cart = JSON.parse(localStorage.getItem("cart") || "[]");

  cart.splice(index, 1);

  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}

function goCheckout() {
  window.location.href = "checkout.html";
}

window.onload = loadCart;
</script>

</body>
</html>
