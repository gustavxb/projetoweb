<!DOCTYPE html>
<html lang="pt-BR" class="antialiased">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeyShop Arena - Home</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            beyRed:   "#ff2e2e",
            beyBlue:  "#00b4ff",
            beyYellow:"#ffd400",
            beyDark:  "#0a0d12",
          }
        }
      }
    }
  </script>

  <style>
    :root {
      --header-height: 72px;
    }

    header.site-header {
      height: var(--header-height);
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      background: linear-gradient(90deg, rgba(10,10,20,.95), rgba(40,10,60,.95));
      border-bottom: 1px solid rgba(255,255,255,0.05);
      backdrop-filter: blur(6px);
    }

    main.site-main {
      padding-top: calc(var(--header-height) + 12px);
    }

    @media (max-width: 640px) {
      :root { --header-height: 64px; }
      main.site-main {
        padding-top: calc(var(--header-height) + 10px);
      }
    }

    /* Background borrado */
    .bg-hero {
      position: relative;
      overflow: hidden;
    }
    .bg-hero::before {
      content:"";
      position:absolute;
      inset:0;
      background-image: url("/mnt/data/Gemini_Generated_Image_cnjizscnjizscnji.png");
      background-size: cover;
      background-position:center;
      filter: blur(7px) brightness(0.5);
      transform: scale(1.06);
      z-index:0;
    }
    .hero-content {
      position: relative;
      z-index: 2;
    }

    .metal-card {
      background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(0,0,0,0.35));
      border: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(6px);
    }
  </style>
</head>

<body class="bg-beyDark text-white">

<!-- HEADER -->
<header class="site-header shadow-xl">
  <div class="max-w-6xl mx-auto px-4 flex items-center justify-between h-full">

    <a href="home.html" class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-gradient-to-br from-beyBlue to-beyRed flex items-center justify-center text-white text-xl">
        🌀
      </div>
      <span class="font-extrabold text-lg">BeyShop Arena</span>
    </a>

    <div class="hidden md:block flex-1 px-4">
      <input placeholder="Buscar Beyblade..." 
             class="w-full rounded-full px-4 py-2 metal-card text-white placeholder-gray-300">
    </div>

    <nav class="flex items-center gap-3">
      <a href="category.html" class="px-3 py-2 rounded-full bg-beyYellow text-black font-semibold">Categorias</a>
      <a href="cart.html" class="px-3 py-2 rounded-full bg-beyBlue text-black font-semibold">Carrinho</a>
      <a href="login.html" class="px-3 py-2 rounded-full metal-card font-semibold">Login</a>
    </nav>

  </div>
</header>

<!-- HERO -->
<section class="bg-hero py-20">
  <div class="hero-content max-w-6xl mx-auto px-4 text-center">

    <h1 class="text-4xl md:text-6xl font-extrabold drop-shadow-lg">
      Bem-vindo à <span class="text-beyYellow">BeyShop Arena</span>
    </h1>

    <p class="mt-4 text-lg max-w-2xl mx-auto text-gray-200">
      A loja definitiva para fãs de <span class="text-beyBlue font-bold">Beyblade</span>!
      Encontre peões, arenas e acessórios oficiais e personalizados.
    </p>

    <a href="category.html"
       class="inline-block mt-8 bg-beyRed px-8 py-3 rounded-full font-bold text-white text-lg hover:scale-105 transition">
       Explorar Produtos
    </a>

  </div>
</section>

<!-- PRODUTOS EM DESTAQUE -->
<main class="site-main max-w-6xl mx-auto px-4 py-10">

  <h2 class="text-3xl font-bold mb-6">🔥 Destaques da Arena</h2>

  <div class="grid md:grid-cols-3 gap-6">

    <!-- Card 1 -->
    <a href="product.html" class="metal-card p-5 rounded-xl hover:scale-105 transition block">
      <img src="/mnt/data/Gemini_Generated_Image_cnjizscnjizscnji.png" class="w-full rounded-lg shadow">
      <h3 class="mt-3 text-xl font-bold">Storm Valkyrie</h3>
      <p class="text-beyYellow font-extrabold text-lg">R$ 150,00</p>
    </a>

    <!-- Card 2 -->
    <a href="product.html" class="metal-card p-5 rounded-xl hover:scale-105 transition block">
      <img src="/mnt/data/Gemini_Generated_Image_cnjizscnjizscnji.png" class="w-full rounded-lg shadow">
      <h3 class="mt-3 text-xl font-bold">Flame Phoenix</h3>
      <p class="text-beyYellow font-extrabold text-lg">R$ 170,00</p>
    </a>

    <!-- Card 3 -->
    <a href="product.html" class="metal-card p-5 rounded-xl hover:scale-105 transition block">
      <img src="/mnt/data/Gemini_Generated_Image_cnjizscnjizscnji.png" class="w-full rounded-lg shadow">
      <h3 class="mt-3 text-xl font-bold">Thunder Draco</h3>
      <p class="text-beyYellow font-extrabold text-lg">R$ 190,00</p>
    </a>

  </div>

</main>

</body>
</html>
